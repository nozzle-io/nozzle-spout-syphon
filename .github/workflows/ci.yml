name: CI

on:
  push:
    branches: [ main, stable ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, stable ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' && github.event_name != 'release' }}

jobs:
  build-macos:
    name: macOS
    runs-on: macos-14
    outputs:
      package_root: ${{ steps.meta.outputs.package_root }}
      package_name: ${{ steps.meta.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Syphon framework
        run: |
          xcodebuild \
            -project deps/Syphon-Framework/Syphon.xcodeproj \
            -scheme Syphon \
            -configuration Release \
            -derivedDataPath build/syphon-derived \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=12.0 \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DNOZZLE_SPOUT_SYPHON_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C RelWithDebInfo

      - name: Prepare package metadata
        id: meta
        shell: bash
        run: |
          product="nozzle-syphon"
          short_sha="${GITHUB_SHA::7}"
          platform="macos"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            base="${product}-${GITHUB_REF_NAME}-${platform}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            base="${product}-latest-${short_sha}-${platform}"
          elif [[ "${GITHUB_REF}" == refs/heads/stable ]]; then
            base="${product}-stable-${short_sha}-${platform}"
          else
            base="${product}-ci-${short_sha}-${platform}"
          fi
          echo "package_root=${base}" >> "$GITHUB_OUTPUT"
          echo "package_name=${base}.zip" >> "$GITHUB_OUTPUT"

      - name: Package and verify macOS app
        run: |
          scripts/package-release.sh \
            macos \
            "${{ steps.meta.outputs.package_name }}" \
            "${{ steps.meta.outputs.package_root }}" \
            build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: ${{ steps.meta.outputs.package_name }}

  build-windows:
    name: Windows
    runs-on: windows-2022
    outputs:
      package_root: ${{ steps.meta.outputs.package_root }}
      package_name: ${{ steps.meta.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -A x64 -DNOZZLE_SPOUT_SYPHON_BUILD_TESTS=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure -C RelWithDebInfo

      - name: Prepare package metadata
        id: meta
        shell: bash
        run: |
          product="nozzle-spout"
          short_sha="${GITHUB_SHA::7}"
          platform="windows-x64"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            base="${product}-${GITHUB_REF_NAME}-${platform}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            base="${product}-latest-${short_sha}-${platform}"
          elif [[ "${GITHUB_REF}" == refs/heads/stable ]]; then
            base="${product}-stable-${short_sha}-${platform}"
          else
            base="${product}-ci-${short_sha}-${platform}"
          fi
          echo "package_root=${base}" >> "$GITHUB_OUTPUT"
          echo "package_name=${base}.zip" >> "$GITHUB_OUTPUT"

      - name: Package and verify Windows app
        shell: pwsh
        run: |
          ./scripts/package-release-windows.ps1 `
            -Platform windows `
            -PackageName "${{ steps.meta.outputs.package_name }}" `
            -PackageRoot "${{ steps.meta.outputs.package_root }}" `
            -BuildDir build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: ${{ steps.meta.outputs.package_name }}

  verify-packages:
    name: Verify downloaded packages
    needs: [build-macos, build-windows]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Verify package contents
        run: |
          set -euo pipefail
          macos_package="release-artifacts/${{ needs.build-macos.outputs.package_root }}/${{ needs.build-macos.outputs.package_name }}"
          windows_package="release-artifacts/${{ needs.build-windows.outputs.package_root }}/${{ needs.build-windows.outputs.package_name }}"
          test -f "$macos_package"
          test -f "$windows_package"

          rm -rf verify-macos verify-windows
          unzip -q "$macos_package" -d verify-macos
          unzip -q "$windows_package" -d verify-windows

          scripts/verify-package.sh macos "verify-macos/${{ needs.build-macos.outputs.package_root }}"
          test -f "verify-windows/${{ needs.build-windows.outputs.package_root }}/nozzle-spout.exe"
          test -f "verify-windows/${{ needs.build-windows.outputs.package_root }}/README.md"
          test -f "verify-windows/${{ needs.build-windows.outputs.package_root }}/LICENSE"
          test -f "verify-windows/${{ needs.build-windows.outputs.package_root }}/THIRD-PARTY-NOTICES.md"

  release:
    name: Publish release artifacts
    needs: [build-macos, build-windows, verify-packages]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-macos.outputs.package_root }}
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-windows.outputs.package_root }}

      - name: Verify downloaded packages
        run: |
          set -euo pipefail
          test -f "${{ needs.build-macos.outputs.package_name }}"
          test -f "${{ needs.build-windows.outputs.package_name }}"
          unzip -l "${{ needs.build-macos.outputs.package_name }}" | grep -F 'nozzle-syphon.app/Contents/MacOS/nozzle-syphon'
          unzip -l "${{ needs.build-windows.outputs.package_name }}" | grep -F 'nozzle-spout.exe'

      - name: Delete old latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release delete latest --cleanup-tag --yes --repo "${GITHUB_REPOSITORY}"
          else
            echo "No existing latest release to delete"
          fi

      - name: Check versioned release asset does not exist
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=(
            "${{ needs.build-macos.outputs.package_name }}"
            "${{ needs.build-windows.outputs.package_name }}"
          )
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' > existing-assets.txt 2>/dev/null; then
            for asset in "${assets[@]}"; do
              if grep -Fx "$asset" existing-assets.txt; then
                echo "versioned release asset already exists: $asset" >&2
                exit 1
              fi
            done
          else
            echo "No existing release for ${GITHUB_REF_NAME}; create step will create it."
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            title="Latest development build"
            notes="Replaceable development snapshot from main at ${GITHUB_SHA}. macOS packages contain the nozzle-syphon Syphon Metal bridge; Windows packages contain the nozzle-spout SpoutDX D3D11 bridge. Runtime support claims still require host smoke evidence."
            gh release create latest \
              "${{ needs.build-macos.outputs.package_name }}" \
              "${{ needs.build-windows.outputs.package_name }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "$title" \
              --notes "$notes" \
              --prerelease
          else
            title="${GITHUB_REF_NAME}"
            notes="Versioned bridge package artifacts. Runtime support claims require separate manual smoke evidence per platform and direction."
            gh release create "${GITHUB_REF_NAME}" \
              "${{ needs.build-macos.outputs.package_name }}" \
              "${{ needs.build-windows.outputs.package_name }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "$title" \
              --notes "$notes"
          fi
